{% if action_center %}
    {% for item in action_center %}
        <article class="action-item {{ item.level }}">
            <strong>{{ item.title }}</strong>
            <div class="meta">{{ item.detail }}</div>
        </article>
    {% endfor %}
{% else %}
    <p class="meta empty-state">No operational issues are active right now.</p>
{% endif %}
