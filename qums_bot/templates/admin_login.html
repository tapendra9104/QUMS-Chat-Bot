<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Login</title>
    <style>
        body {
            background: linear-gradient(135deg, #102d3f, #1c6e8c);
            color: #183247;
            font-family: "Segoe UI", Tahoma, sans-serif;
            margin: 0;
            min-height: 100vh;
        }
        .wrap {
            display: grid;
            min-height: 100vh;
            place-items: center;
            padding: 24px;
        }
        .card {
            background: #fff;
            border: 1px solid #d7e0ea;
            border-radius: 18px;
            box-shadow: 0 14px 30px rgba(10, 28, 38, 0.2);
            max-width: 420px;
            padding: 28px;
            width: 100%;
        }
        h1 {
            margin-top: 0;
        }
        label {
            display: block;
            font-size: 0.92rem;
            font-weight: 600;
            margin-bottom: 6px;
        }
        input[type="text"],
        input[type="password"] {
            border: 1px solid #bfd0dc;
            border-radius: 10px;
            box-sizing: border-box;
            margin-bottom: 14px;
            padding: 12px 14px;
            width: 100%;
        }
        button {
            background: #0d6e8b;
            border: 0;
            border-radius: 10px;
            color: #fff;
            cursor: pointer;
            padding: 12px 16px;
            width: 100%;
        }
        .flash {
            border-radius: 12px;
            margin-bottom: 12px;
            padding: 12px 14px;
        }
        .flash.error {
            background: #fdecec;
            border: 1px solid #efb0b0;
        }
        .flash.success {
            background: #e7f8ed;
            border: 1px solid #abd9bb;
        }
        .meta {
            color: #5c7284;
            font-size: 0.92rem;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <section class="card">
            <h1>QUMS Bot Admin</h1>
            <p class="meta">Sign in to access the deployed dashboard.</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash {{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="post" action="{{ url_for('admin_login_submit') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <input type="hidden" name="next_path" value="{{ next_path }}">
                <label for="username">Username</label>
                <input id="username" name="username" type="text" autocomplete="username" required>

                <label for="password">Password</label>
                <input id="password" name="password" type="password" autocomplete="current-password" required>

                <button type="submit">Sign In</button>
            </form>
        </section>
    </div>
</body>
</html>
