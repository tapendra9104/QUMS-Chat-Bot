<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Manual ERP Login</title>
    <meta name="theme-color" content="#0e4f64">
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
</head>
<body class="auth-body">
    <div class="auth-shell">
        <div class="auth-card auth-card--xl">
            <div class="auth-hero">
                <h1 class="auth-title">Manual ERP Login</h1>
                <p class="meta auth-hero-meta">Complete the ERP captcha once to restore the student session.</p>
            </div>
            <div class="auth-content">
                <p class="meta">
                    Student: {{ student.student_label }}<br>
                    ERP user id: {{ student.user_name }}
                </p>
                <p>The bot will not solve the captcha automatically. Enter the captcha shown below to activate the ERP session.</p>
                <img class="auth-captcha" src="{{ pending.captcha_data_url }}" alt="ERP captcha">
                <form method="post" action="{{ url_for('complete_login', student_id=student.id) }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <label for="captcha">Captcha</label>
                    <input id="captcha" name="captcha" type="text" autocomplete="off" required>
                    <div class="auth-actions">
                        <button type="submit">Complete Login</button>
                    </div>
                </form>
                <div class="auth-actions">
                    <form method="post" action="{{ url_for('refresh_login', student_id=student.id) }}">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <button type="submit" class="secondary">Refresh Captcha</button>
                    </form>
                    <a class="button-link ghost" href="{{ url_for('dashboard') }}">Back to Dashboard</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
