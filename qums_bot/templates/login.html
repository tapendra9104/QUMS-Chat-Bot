<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Manual ERP Login</title>
    <style>
        :root {
            --page-bg: #eef3f5;
            --page-ink: #173346;
            --panel-bg: rgba(255, 255, 255, 0.92);
            --panel-border: rgba(23, 51, 70, 0.12);
            --panel-shadow: 0 24px 48px rgba(15, 36, 48, 0.16);
            --accent: #0f6f87;
            --muted: #5d7282;
        }
        body {
            background:
                radial-gradient(circle at top left, rgba(46, 148, 170, 0.18), transparent 32%),
                radial-gradient(circle at bottom right, rgba(16, 47, 69, 0.18), transparent 28%),
                linear-gradient(180deg, #f7fafb 0%, var(--page-bg) 100%);
            color: var(--page-ink);
            font-family: "Aptos", "Trebuchet MS", "Segoe UI", sans-serif;
            margin: 0;
            min-height: 100vh;
        }
        .wrap {
            margin: 0 auto;
            max-width: 680px;
            padding: 32px 18px 48px;
        }
        .card {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            box-shadow: var(--panel-shadow);
            overflow: hidden;
            padding: 0;
        }
        .hero {
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.18), transparent 34%),
                linear-gradient(135deg, #102f45 0%, #15586f 52%, #1a7d89 100%);
            color: #f4fbfd;
            padding: 28px 28px 22px;
        }
        .content {
            padding: 24px 28px 28px;
        }
        h1, h2 {
            letter-spacing: -0.03em;
            margin-top: 0;
        }
        img {
            background: #f8fbfd;
            border: 1px solid #d1dce6;
            border-radius: 16px;
            box-shadow: 0 12px 24px rgba(23, 51, 70, 0.08);
            display: block;
            margin: 20px auto;
            max-width: 100%;
        }
        input[type="text"] {
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid #bfd0dc;
            border-radius: 12px;
            box-sizing: border-box;
            color: var(--page-ink);
            font: inherit;
            padding: 12px 14px;
            transition: border-color 0.18s ease, box-shadow 0.18s ease;
            width: 100%;
        }
        input[type="text"]:focus {
            border-color: rgba(15, 111, 135, 0.7);
            box-shadow: 0 0 0 4px rgba(15, 111, 135, 0.14);
            outline: none;
        }
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 16px;
        }
        button, a {
            background: linear-gradient(135deg, var(--accent) 0%, #1482a0 100%);
            border: 0;
            border-radius: 12px;
            box-shadow: 0 16px 26px rgba(15, 111, 135, 0.18);
            color: #fff;
            cursor: pointer;
            display: inline-block;
            font: inherit;
            font-weight: 600;
            padding: 10px 14px;
            text-decoration: none;
            transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
        }
        button.secondary {
            background: linear-gradient(135deg, #5d7a8f 0%, #6d8ea4 100%);
        }
        button:hover, a:hover {
            box-shadow: 0 20px 34px rgba(15, 111, 135, 0.22);
            transform: translateY(-1px);
        }
        .meta {
            color: var(--muted);
            font-size: 0.95rem;
            line-height: 1.55;
        }
        @media (max-width: 720px) {
            .wrap {
                padding: 18px 14px 36px;
            }
            .card {
                border-radius: 20px;
            }
            .hero {
                padding: 24px 20px 20px;
            }
            .content {
                padding: 20px;
            }
            .actions {
                align-items: stretch;
                flex-direction: column;
            }
            .actions > * {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="card">
            <div class="hero">
                <h1>Manual ERP Login</h1>
                <p class="meta" style="color: rgba(244, 251, 253, 0.82); margin-bottom: 0;">Complete the ERP captcha once to restore the student session.</p>
            </div>
            <div class="content">
                <p class="meta">
                    Student: {{ student.student_label }}<br>
                    ERP user id: {{ student.user_name }}
                </p>
                <p>The bot will not solve the captcha automatically. Enter the captcha shown below to activate the ERP session.</p>
                <img src="{{ pending.captcha_data_url }}" alt="ERP captcha">
                <form method="post" action="{{ url_for('complete_login', student_id=student.id) }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <label for="captcha">Captcha</label>
                    <input id="captcha" name="captcha" type="text" autocomplete="off" required>
                    <div class="actions">
                        <button type="submit">Complete Login</button>
                    </div>
                </form>
                <div class="actions">
                    <form method="post" action="{{ url_for('refresh_login', student_id=student.id) }}">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <button type="submit" class="secondary">Refresh Captcha</button>
                    </form>
                    <a href="{{ url_for('dashboard') }}">Back to Dashboard</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
